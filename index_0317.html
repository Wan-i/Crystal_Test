        // --- 核心邏輯 [cite: 63-71] ---
        function handleCalculate() {
            const birthday = document.getElementById('birthday-input').value;
            if (!birthday) return;

            const btnContent = document.getElementById('btn-content');
            btnContent.innerHTML = '<i data-lucide="refresh-cw" class="animate-spin-slow w-6 h-6"></i>';
            lucide.createIcons();

            setTimeout(() => {
                const date = new Date(birthday);
                const year = date.getFullYear();
                const month = date.getMonth() + 1;
                const day = date.getDate();

                // 1. 生命靈數 [cite: 64]
                const digits = birthday.replace(/\D/g, '').split('').map(Number);
                let numSum = digits.reduce((a, b) => a + b, 0);
                while (numSum > 9) numSum = numSum.toString().split('').map(Number).reduce((a, b) => a + b, 0);
                const nData = NUMEROLOGY_DATA[numSum];

                // 2. 西洋星座 [cite: 65]
                const monthDay = `${month.toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;
                const zData = ZODIAC_DATA.find(z => {
                    if (z.start <= z.end) return monthDay >= z.start && monthDay <= z.end;
                    return monthDay >= z.start || monthDay <= z.end;
                });

                // 3. 東方生肖 [cite: 65]
                const animal = CHINESE_ZODIAC_LIST[(year - 1900) % 12];
                const aData = CHINESE_ZODIAC_DATA[animal];

                // 渲染卡片 [cite: 78, 79]
                const container = document.getElementById('results-container');
                container.innerHTML = `
                    ${renderEnergyCard(`Life Path · ${nData.key}`, nData.name, numSum, nData)}
                    ${renderEnergyCard(`Zodiac · ${zData.name}`, zData.crystal, 'zodiac', zData)}
                    ${renderEnergyCard(`Soul Sign · Guardian`, aData.crystal, animal, aData)}
                `;

                document.getElementById('input-panel').classList.add('hidden');
                document.getElementById('result-panel').classList.remove('hidden');
                btnContent.innerHTML = '<i data-lucide="compass" class="w-5 h-5 group-hover:rotate-45 transition-transform duration-700"></i>解密您的能量配方';
                lucide.createIcons();
            }, 800);
        }

            } else if (typeof iconType === 'string' && isNaN(iconType)) {
                iconHtml = `<span class="text-2xl font-bold ${data.color} opacity-80">${iconType}</span>`;
            } else {
                iconHtml = `<span class="text-3xl font-light ${data.color}">${iconType}</span>`;
            }

            return `
            <div class="group p-8 rounded-[3rem] bg-gradient-to-br ${data.cardBg} border border-white shadow-sm transition-all hover:shadow-xl hover:shadow-stone-200/40 hover:-translate-y-1 duration-500">
                <div class="flex items-start gap-6">
                    <div class="w-16 h-16 rounded-2xl ${data.lightAccent} flex items-center justify-center flex-shrink-0 group-hover:scale-110 transition-transform duration-500 shadow-sm border border-white">
                        ${iconHtml}
                    </div>
                    <div class="flex-1">
                        <div class="text-[10px] ${data.color} font-bold tracking-[0.2em] uppercase mb-1 flex items-center gap-2 font-sans opacity-80">
                            ${subLabel}
                        </div>
                        <h3 class="text-2xl font-bold ${data.color}">${label}</h3>
                        <p class="text-stone-400 text-sm leading-relaxed mt-2 italic font-light">${data.benefit}</p>
                    </div>
                </div>
                <div class="mt-6 relative pl-6 py-1 group/oil">
                    <div class="absolute left-0 top-0 bottom-0 w-[2px] ${data.accent} opacity-20 group-hover/oil:opacity-100 transition-opacity duration-500"></div>
                    <div class="flex flex-col gap-1">
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] font-bold tracking-[0.2em] text-stone-300 uppercase font-sans">Destined Scent</span>
                            <div class="h-[1px] flex-1 bg-stone-100/50"></div>
                        </div>
                        <div class="flex items-baseline gap-2 mt-1">
                            <h4 class="text-xl font-bold tracking-tight ${data.color}">${data.oil}</h4>
                            <span class="text-sm font-medium text-stone-400 font-sans italic opacity-70">${data.oilEn}</span>
                        </div>
                        <p class="text-stone-500 text-sm leading-relaxed mt-1 max-w-[90%] font-light">
                            ${data.oilBenefit}
                        </p>
                    </div>
                </div>
            </div>`;
        }

        // --- 百科彈窗邏輯 [cite: 85-88] ---
        function openLibrary() { 
            document.getElementById('library-modal').classList.remove('hidden'); 
            switchTab('num'); 
        }
        function closeLibrary() { 
            document.getElementById('library-modal').classList.add('hidden'); 
        }

        function switchTab(tabId) {
            ['num', 'zodiac', 'animal'].forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                if (t === tabId) {
                    btn.className = "flex-1 py-4 rounded-[1.5rem] text-xs font-bold tracking-wider transition-all duration-300 bg-white text-stone-800 shadow-sm border border-stone-100";
                } else {
                    btn.className = "flex-1 py-4 rounded-[1.5rem] text-xs font-bold tracking-wider transition-all duration-300 text-stone-400";
                }
            });

            const content = document.getElementById('library-content');
            let html = '';
            if (tabId === 'num') {
                Object.entries(NUMEROLOGY_DATA).forEach(([key, d]) => {
                    html += renderEnergyCard(`Path ${key} · ${d.key}`, d.name, key, d);
                });
            } else if (tabId === 'zodiac') {
                ZODIAC_DATA.filter((v, i, a) => a.findIndex(t => (t.name === v.name)) === i).forEach(d => {
                    html += renderEnergyCard(`Zodiac · ${d.name}`, d.crystal, 'zodiac', d);
                });
            } else {
                CHINESE_ZODIAC_LIST.forEach(name => {
                    const d = CHINESE_ZODIAC_DATA[name];
                    html += renderEnergyCard(`Soul Sign · ${name}`, d.crystal, name, d);
                });
            }
            content.innerHTML = html;
            lucide.createIcons();
        }

        function resetApp() {
            document.getElementById('input-panel').classList.remove('hidden');
            document.getElementById('result-panel').classList.add('hidden');
            document.getElementById('birthday-input').value = '';
        }
    </script>
</body>
</html>
