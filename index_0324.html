        // 核心計算 [cite: 48, 49, 50, 51, 52]
        function calculate() {
            const dateStr = document.getElementById('birthday').value;
            if (!dateStr) return;

            const btnText = document.getElementById('btn-text');
            btnText.innerHTML = '<i data-lucide="refresh-cw" class="animate-spin-slow w-5 h-5"></i> 解密中...';
            lucide.createIcons();

            setTimeout(() => {
                const date = new Date(dateStr);
                const digits = dateStr.replace(/\D/g, '').split('').map(Number);
                let numSum = digits.reduce((a, b) => a + b, 0);
                while (numSum > 9) numSum = numSum.toString().split('').map(Number).reduce((a, b) => a + b, 0);
                
                const monthDay = `${(date.getMonth()+1).toString().padStart(2, '0')}-${date.getDate().toString().padStart(2, '0')}`;
                const zodiac = ZODIAC_DATA.find(z => (z.start <= z.end) ? (monthDay >= z.start && monthDay <= z.end) : (monthDay >= z.start || monthDay <= z.end));
                const animal = CHINESE_ZODIAC_LIST[(date.getFullYear() - 1900) % 12];

                renderResults(numSum, zodiac, animal);
                document.getElementById('input-panel').classList.add('hidden');
                document.getElementById('result-panel').classList.remove('hidden');
            }, 800);
        }

        function renderResults(num, zodiac, animal) {
            const container = document.getElementById('results-content');
            container.innerHTML = `
                ${createEnergyCard(`Life Path ${num} · ${NUMEROLOGY_DATA[num].key}`, NUMEROLOGY_DATA[num].name, num, NUMEROLOGY_DATA[num])}
                ${createEnergyCard(`Zodiac · ${zodiac.name}`, zodiac.crystal, 'zodiac', zodiac, zodiac.name)}
                ${createEnergyCard(`Soul Sign · ${animal}`, CHINESE_ZODIAC_DATA[animal].crystal, animal, CHINESE_ZODIAC_DATA[animal])}
            `;
            lucide.createIcons();
        }

            } else if (isNaN(iconType)) {
                iconHtml = `<span class="text-2xl font-bold ${data.color} opacity-60">${iconType}</span>`;
            } else {
                iconHtml = `<span class="text-3xl font-light ${data.color}">${iconType}</span>`;
            }

            return `
            <div class="group p-8 rounded-[3rem] ${data.bgColor} border border-white transition-all shadow-sm hover:shadow-xl relative overflow-hidden">
                <div class="absolute inset-0 border-2 ${data.border} rounded-[3rem] opacity-40 group-hover:opacity-100 transition-opacity"></div>
                <div class="flex items-start gap-6 relative z-10">

                    <div class="flex-1">
                        <div class="text-[10px] ${data.color} font-bold tracking-[0.2em] uppercase mb-1 font-sans opacity-80">${sub}</div>
                        <h3 class="text-2xl font-bold ${data.color}">${label}</h3>
                        <p class="text-stone-500 text-sm italic mt-2">${data.benefit}</p>
                    </div>
                </div>
                <div class="mt-6 relative pl-6 py-1 group/oil z-10">
                    <div class="absolute left-0 top-0 bottom-0 w-[2px] ${data.accent} opacity-20 group-hover/oil:opacity-100 transition-opacity duration-500"></div>
                    <div class="flex items-center gap-2 mb-1">
                        <span class="text-[10px] font-bold tracking-[0.2em] text-stone-300 uppercase font-sans">Destined Scent</span>
                        <div class="h-[1px] flex-1 bg-stone-100/50"></div>
                    </div>
                    <div class="flex items-baseline gap-2"><h4 class="text-xl font-bold ${data.color}">${data.oil}</h4><span class="text-sm font-medium text-stone-400 font-sans italic opacity-70">${data.oilEn}</span></div>
                    <p class="text-stone-500 text-sm mt-1 font-light">${data.oilBenefit}</p>
                </div>
            </div>`;
        }

        // 圖鑑邏輯 [cite: 47]
        function openLibrary() { document.getElementById('library-modal').classList.remove('hidden'); switchTab('num'); }
        function closeLibrary() { document.getElementById('library-modal').classList.add('hidden'); }
        function switchTab(tabId) {
            ['num', 'zodiac', 'animal'].forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                if (t === tabId) btn.className = "flex-1 py-4 rounded-[1.5rem] text-xs font-bold bg-white text-stone-800 shadow-sm border border-stone-100";
                else btn.className = "flex-1 py-4 rounded-[1.5rem] text-xs font-bold text-stone-400";
            });
            const list = document.getElementById('library-list');
            let html = '';
            if (tabId === 'num') Object.entries(NUMEROLOGY_DATA).forEach(([k, d]) => html += createEnergyCard(`Path ${k} · ${d.key}`, d.name, k, d));
            else if (tabId === 'zodiac') ZODIAC_DATA.filter((v,i,a) => a.findIndex(t=>(t.name===v.name))===i).forEach(d => html += createEnergyCard(`Zodiac · ${d.name}`, d.crystal, 'zodiac', d, d.name));
            else CHINESE_ZODIAC_LIST.forEach(n => html += createEnergyCard(`Soul Sign · ${n}`, CHINESE_ZODIAC_DATA[n].crystal, n, CHINESE_ZODIAC_DATA[n]));
            list.innerHTML = html;
            lucide.createIcons();
        }

        lucide.createIcons();
    </script>
</body>
</html>
