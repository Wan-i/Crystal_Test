            "羊": { crystal: "珊瑚", benefit: "強健體魄與情感穩定", color: "text-rose-500", border: "border-rose-200", bgColor: "bg-[#fffafb]" },
            "猴": { crystal: "瑪瑙", benefit: "聰明機智與口才順暢", color: "text-orange-500", border: "border-orange-200", bgColor: "bg-[#fffaf5]" },
            "雞": { crystal: "翡翠", benefit: "官運亨通與富貴吉祥", color: "text-emerald-700", border: "border-emerald-200", bgColor: "bg-[#f7fdf9]" },
            "狗": { crystal: "舒俱徠", benefit: "靈性守護與健康平衡", color: "text-violet-500", border: "border-violet-200", bgColor: "bg-[#fafaff]" },
            "豬": { crystal: "螢石", benefit: "清明心境與學業進步", color: "text-teal-500", border: "border-teal-200", bgColor: "bg-[#f5fdfd]" }
        };

        lucide.createIcons();

        // 運算邏輯 [cite: 13, 14, 15]
        function handleCalculate() {
            const input = document.getElementById('birthday-input').value;
            if (!input) return;

            const btnContent = document.getElementById('btn-content');
            btnContent.innerHTML = '<i data-lucide="refresh-cw" class="animate-spin-slow w-6 h-6"></i>';
            lucide.createIcons();

            setTimeout(() => {
                const date = new Date(input);
                const year = date.getFullYear();
                const month = date.getMonth() + 1;
                const day = date.getDate();

                // 生命靈數
                const digits = input.replace(/\D/g, '').split('').map(Number);
                let sum = digits.reduce((a, b) => a + b, 0);
                while (sum > 9) sum = sum.toString().split('').map(Number).reduce((a, b) => a + b, 0);
                const n = NUMEROLOGY_DATA[sum];

                // 星座
                const md = `${month.toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;
                const z = ZODIAC_DATA.find(i => i.start <= i.end ? (md >= i.start && md <= i.end) : (md >= i.start || md <= i.end));

                // 生肖
                const animalName = CHINESE_LIST[(year - 1900) % 12];
                const a = CHINESE_DATA[animalName];

                // 更新 UI 配色與內容 [cite: 23, 24, 25, 26, 27, 28, 29]
                updateCard('card-num', n, 'val-num', sum, 'name-num', n.name, 'benefit-num', n.benefit, 'label-num');
                updateCard('card-zodiac', z, null, null, 'zodiac-crystal', z.crystal, 'zodiac-benefit', z.benefit, 'label-zodiac');
                document.getElementById('zodiac-name-label').innerText = z.name;
                updateCard('card-animal', a, 'val-animal', animalName, 'animal-crystal', a.crystal, 'animal-benefit', a.benefit, 'label-animal');

                // 精油標籤生成 [cite: 32, 33, 34]
                const container = document.getElementById('oil-tags');
                container.innerHTML = n.oils.split('、').map(o => `<span class="bg-white text-emerald-700 text-xs px-3 py-1.5 rounded-full border border-emerald-100 font-bold shadow-sm transition-transform hover:-translate-y-0.5">${o}</span>`).join('');
                document.getElementById('trait-desc').innerText = `特質：${n.trait}。協助調和靈數 ${sum} 的能量場。`;

                document.getElementById('input-section').classList.add('hidden');
                document.getElementById('result-section').classList.remove('hidden');
                btnContent.innerHTML = '<i data-lucide="compass" class="w-5 h-5"></i>開啟能量地圖';
                lucide.createIcons();
            }, 800);
        }

        function updateCard(cardId, data, valId, val, titleId, title, descId, desc, labelId) {
            const card = document.getElementById(cardId);
            card.className = `group ${data.bgColor} p-6 rounded-[2rem] border ${data.border} transition-all shadow-sm flex items-center gap-6`;
            if (valId) document.getElementById(valId).innerText = val;
            if (valId) document.getElementById(valId).className = `text-3xl font-light ${data.color}`;
            document.getElementById(titleId).innerText = title;
            document.getElementById(titleId).className = `text-2xl font-bold ${data.color} mb-0.5`;
            document.getElementById(descId).innerText = desc;
            document.getElementById(labelId).className = `text-[10px] ${data.color} opacity-70 font-bold tracking-[0.2em] uppercase mb-1 flex items-center gap-2 font-sans`;
        }

        function resetForm() {
            document.getElementById('input-section').classList.remove('hidden');
            document.getElementById('result-section').classList.add('hidden');
            document.getElementById('birthday-input').value = '';
        }

        // 百科功能 [cite: 45, 46, 47, 48, 49, 50, 51]
        function toggleLibrary(show) {
            document.getElementById('library-modal').classList.toggle('hidden', !show);
            if (show) switchTab('num');
        }

        function switchTab(tabId) {
            ['num', 'zodiac', 'animal'].forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                const active = t === tabId;
                btn.className = `flex-1 flex items-center justify-center gap-2 py-3 rounded-2xl text-xs font-bold tracking-wider transition-all ${active ? 'bg-white text-amber-700 shadow-sm border border-amber-100' : 'text-[#8e8578] hover:bg-white/50'}`;
            });

            const content = document.getElementById('library-content');
            let html = '';
            if (tabId === 'num') {
                Object.entries(NUMEROLOGY_DATA).forEach(([key, d]) => {
                    html += `<div class="p-5 rounded-3xl border ${d.border} ${d.bgColor} flex gap-5 items-start">
                        <div class="w-12 h-12 rounded-full bg-white flex items-center justify-center ${d.color} font-bold text-xl shadow-sm border border-inherit flex-shrink-0">${key}</div>
                        <div>
                            <h4 class="text-lg font-bold ${d.color}">${d.name} <span class="text-[10px] opacity-60">靈數 ${key}</span></h4>
                            <p class="text-[#8e8578] text-xs mt-1">功效：${d.benefit}</p>
                            <div class="mt-3 flex flex-wrap gap-1.5">${d.oils.split('、').map(o => `<span class="text-[10px] bg-white/80 px-2 py-1 rounded-lg border border-inherit/30 italic">#${o}</span>`).join('')}</div>
                        </div>
                    </div>`;
                });
            } else if (tabId === 'zodiac') {
                ZODIAC_DATA.filter((v, i, a) => a.findIndex(t => t.name === v.name) === i).forEach(d => {
                    html += `<div class="p-5 rounded-3xl border ${d.border} ${d.bgColor} flex gap-5 items-start">
                        <div class="w-12 h-12 rounded-full bg-white flex items-center justify-center ${d.color} flex-shrink-0 border border-inherit shadow-sm"><i data-lucide="sun"></i></div>
                        <div class="flex-1"><h4 class="text-lg font-bold ${d.color}">${d.name}</h4><p class="text-sm font-bold mt-1">對應水晶：${d.crystal}</p><p class="text-[#8e8578] text-xs mt-1 italic">${d.benefit}</p></div>
                    </div>`;
                });
            } else {
                CHINESE_LIST.forEach(name => {
                    const d = CHINESE_DATA[name];
                    html += `<div class="p-5 rounded-3xl border ${d.border} ${d.bgColor} flex gap-5 items-start">
                        <div class="w-12 h-12 rounded-full bg-white flex items-center justify-center flex-shrink-0 border border-inherit shadow-sm"><span class="text-xl font-bold ${d.color} opacity-60">${name}</span></div>
                        <div class="flex-1"><h4 class="text-lg font-bold ${d.color}">${d.crystal}</h4><p class="text-[#8e8578] text-xs mt-1 italic">${d.benefit}</p></div>
                    </div>`;
                });
            }
            content.innerHTML = html;
            lucide.createIcons();
        }
    </script>
</body>
</html>
