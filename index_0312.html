                // 更新 UI [cite: 87-99]
                updateCard('card-num', n, 'val-num', numSum, 'name-num', n.name, 'benefit-num', n.benefit, 'label-num', `靈數 ${n.key}`, 'oil-title-num', `命定香氣：${n.oil}`, 'oil-desc-num', n.oilBenefit);
                updateCard('card-zodiac', z, null, null, 'crystal-zodiac', z.crystal, 'benefit-zodiac', z.benefit, 'label-zodiac', z.name, 'oil-title-zodiac', `命定香氣：${z.oil}`, 'oil-desc-zodiac', z.oilBenefit);
                updateCard('card-animal', a, 'val-animal', animalName, 'crystal-animal', a.crystal, 'benefit-animal', a.benefit, 'label-animal', "生肖對應", 'oil-title-animal', `命定香氣：${a.oil}`, 'oil-desc-animal', a.oilBenefit);

                document.getElementById('input-panel').classList.add('hidden');
                document.getElementById('result-panel').classList.remove('hidden');
                btnContent.innerHTML = '<i data-lucide="compass" class="w-5 h-5"></i>開啟能量地圖';
                lucide.createIcons();
            }, 800);
        }

        function updateCard(cardId, data, valId, val, titleId, title, descId, desc, labelId, labelText, oilTitleId, oilTitle, oilDescId, oilDesc) {
            const card = document.getElementById(cardId);
            card.className = `group ${data.bgColor} p-6 rounded-[2.5rem] border ${data.border} transition-all shadow-sm`;
            if (valId) document.getElementById(valId).innerText = val;
            if (valId) document.getElementById(valId).className = valId === 'val-animal' ? `text-2xl font-bold ${data.color} opacity-60` : `text-3xl font-light ${data.color}`;
            document.getElementById(titleId).innerText = title;
            document.getElementById(titleId).className = `text-2xl font-bold ${data.color} mb-0.5`;
            document.getElementById(descId).innerText = desc;
            document.getElementById(labelId).className = `text-[10px] ${data.color} opacity-70 font-bold tracking-[0.2em] uppercase mb-1 flex items-center gap-2 font-sans`;
            const labelSpan = document.getElementById(labelId).querySelector('span') || document.getElementById(labelId).childNodes[2];
            if (labelSpan.nodeType === 3) document.getElementById(labelId).lastChild.textContent = " " + labelText; else labelSpan.innerText = labelText;
            document.getElementById(oilTitleId).innerText = oilTitle;
            document.getElementById(oilDescId).innerText = oilDesc;
        }

        function resetApp() {
            document.getElementById('input-panel').classList.remove('hidden');
            document.getElementById('result-panel').classList.add('hidden');
            document.getElementById('birthday-input').value = '';
        }

        // 百科邏輯 [cite: 105-121]
        function openLibrary() { document.getElementById('library-modal').classList.remove('hidden'); switchTab('num'); }
        function closeLibrary() { document.getElementById('library-modal').classList.add('hidden'); }

        function switchTab(tabId) {
            ['num', 'zodiac', 'animal'].forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                btn.className = `flex-1 py-3 rounded-2xl text-xs font-bold tracking-wider transition-all ${t === tabId ? 'bg-white text-amber-700 shadow-sm border border-amber-100' : 'text-[#8e8578]'}`;
            });
            const content = document.getElementById('library-content');
            let html = '';
            if (tabId === 'num') {
                Object.entries(NUMEROLOGY_DATA).forEach(([key, d]) => {
                    html += `<div class="p-5 rounded-3xl border ${d.border} ${d.bgColor} flex gap-5 items-start">
                        <div class="w-12 h-12 rounded-full bg-white flex items-center justify-center ${d.color} font-bold text-xl shadow-sm border border-inherit flex-shrink-0">${key}</div>
                        <div class="flex-1"><h4 class="text-lg font-bold ${d.color} flex items-center gap-2">${d.name} <span class="text-[10px] bg-white px-2 py-0.5 rounded-full border border-inherit opacity-60">靈數 ${d.key}</span></h4>
                        <p class="text-[#5c564d] text-sm mt-1">${d.benefit}</p><div class="mt-3 p-3 bg-white/40 rounded-xl border border-inherit"><p class="text-[11px] font-bold text-emerald-700">命定香氣：${d.oil}</p><p class="text-[#8e8578] text-[10px] italic">${d.oilBenefit}</p></div></div></div>`;
                });
            } else if (tabId === 'zodiac') {
                ZODIAC_DATA.filter((v, i, a) => a.findIndex(t => (t.name === v.name)) === i).forEach(d => {
                    html += `<div class="p-5 rounded-3xl border ${d.border} ${d.bgColor} flex gap-5 items-start">
                        <div class="w-12 h-12 rounded-full bg-white flex items-center justify-center ${d.color} flex-shrink-0 border border-inherit shadow-sm"><i data-lucide="sun" class="w-6 h-6"></i></div>
                        <div class="flex-1"><h4 class="text-lg font-bold ${d.color}">${d.name} × ${d.crystal}</h4><p class="text-[#5c564d] text-sm mt-1">${d.benefit}</p><div class="mt-3 p-3 bg-white/40 rounded-xl border border-inherit"><p class="text-[11px] font-bold text-emerald-700">命定香氣：${d.oil}</p><p class="text-[#8e8578] text-[10px] italic">${d.oilBenefit}</p></div></div></div>`;
                });
            } else {
                CHINESE_ZODIAC_LIST.forEach(name => {
                    const d = CHINESE_ZODIAC_DATA[name];
                    html += `<div class="p-5 rounded-3xl border ${d.border} ${d.bgColor} flex gap-5 items-start">
                        <div class="w-12 h-12 rounded-full bg-white flex items-center justify-center flex-shrink-0 border border-inherit shadow-sm"><span class="text-xl font-bold ${d.color} opacity-60">${name}</span></div>
                        <div class="flex-1"><h4 class="text-lg font-bold ${d.color}">${d.crystal}</h4><p class="text-[#5c564d] text-sm mt-1">${d.benefit}</p><div class="mt-3 p-3 bg-white/40 rounded-xl border border-inherit"><p class="text-[11px] font-bold text-emerald-700">命定香氣：${d.oil}</p><p class="text-[#8e8578] text-[10px] italic">${d.oilBenefit}</p></div></div></div>`;
                });
            }
            content.innerHTML = html;
            lucide.createIcons();
        }
    </script>
</body>
</html>
