        const CHINESE_ZODIAC_DATA = {

            "龍": { crystal: "黃水晶", benefit: "活絡人際關係，增加財運助力。", ...COLOR_MAP.yellow },

            "雞": { crystal: "太陽石", benefit: "帶來正向能量、招財及辟邪。", ...COLOR_MAP.orange },

            "豬": { crystal: "海藍寶", benefit: "舒緩情緒、增強表達能力。", ...COLOR_MAP.blue }
        };

        const ZODIAC_DATA = [
            { name: "摩羯座", start: "01-01", end: "01-19", crystal: "茶晶", benefit: "助事業發展，吸收負能量。", ...COLOR_MAP.brown },
            { name: "水瓶座", start: "01-20", end: "02-18", crystal: "天河石", benefit: "激發創意靈感，增強直覺。", ...COLOR_MAP.cyan },
            { name: "雙魚座", start: "02-19", end: "03-20", crystal: "紫水晶", benefit: "保護心靈，加強自癒能力。", ...COLOR_MAP.purple },
            { name: "牡羊座", start: "03-21", end: "04-19", crystal: "紅瑪瑙", benefit: "增強行動力、勇氣與領導力。", ...COLOR_MAP.red },
            { name: "金牛座", start: "04-20", end: "05-20", crystal: "東菱玉", benefit: "強化財運，提升愛與包容力。", ...COLOR_MAP.green },

            { name: "處女座", start: "08-23", end: "09-22", crystal: "海藍寶", benefit: "增強智慧，平衡過度完美。", ...COLOR_MAP.cyan },
            { name: "天秤座", start: "09-23", end: "10-23", crystal: "粉晶", benefit: "提升人緣、平衡優柔寡斷。", ...COLOR_MAP.pink },
            { name: "天蠍座", start: "10-24", end: "11-22", crystal: "黑曜石", benefit: "轉化情緒壓力，提供強大保護。", ...COLOR_MAP.black },
            { name: "射手座", start: "11-23", end: "12-21", crystal: "青金石", benefit: "開闊視野，提升直覺視野。", ...COLOR_MAP.indigo },
            { name: "摩羯座", start: "12-22", end: "12-31", crystal: "茶晶", benefit: "增強體力、穩定情緒。", ...COLOR_MAP.brown }
        ];

        const CHINESE_LIST = ["鼠", "牛", "虎", "兔", "龍", "蛇", "馬", "羊", "猴", "雞", "狗", "豬"];

        // 初始化
        lucide.createIcons();

        // 核心運算邏輯 (轉化自 source: 13, 14, 15, 16)
        function handleCalculate() {
            const birthday = document.getElementById('birthday-input').value;
            if (!birthday) return;

            // Loading 狀態
            const btn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            btn.disabled = true;
            btnText.innerHTML = '<i data-lucide="refresh-cw" class="animate-spin-slow w-6 h-6"></i>';
            lucide.createIcons();

            setTimeout(() => {
                const date = new Date(birthday);
                const year = date.getFullYear();
                const month = date.getMonth() + 1;
                const day = date.getDate();

                // 1. 生命靈數
                const digits = birthday.replace(/\D/g, '').split('').map(Number);
                let numSum = digits.reduce((a, b) => a + b, 0);
                while (numSum > 9) numSum = numSum.toString().split('').map(Number).reduce((a, b) => a + b, 0);
                const nData = NUMEROLOGY_DATA[numSum];

                // 2. 西洋星座
                const md = `${month.toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;
                const zData = ZODIAC_DATA.find(z => {
                    if (z.start <= z.end) return md >= z.start && md <= z.end;
                    return md >= z.start || md <= z.end;
                });

                // 3. 生肖
                const animal = CHINESE_LIST[(year - 1900) % 12];
                const aData = CHINESE_ZODIAC_DATA[animal];

                // 更新 UI
                updateUI(numSum, nData, zData, animal, aData);
                
                // 切換面板
                document.getElementById('input-panel').classList.add('hidden');
                document.getElementById('result-panel').classList.remove('hidden');
                
                // 恢復按鈕
                btn.disabled = false;
                btnText.innerHTML = '<i data-lucide="compass" class="w-5 h-5"></i>開啟能量地圖';
                lucide.createIcons();
            }, 800);
        }

        function updateUI(num, n, z, animal, a) {
            // 生命靈數
            const cardNum = document.getElementById('card-num');
            cardNum.className = `group ${n.bgColor} p-6 rounded-[2rem] border ${n.border} transition-all shadow-sm flex items-center gap-6`;
            document.getElementById('val-num').innerText = num;
            document.getElementById('val-num').className = `text-3xl font-light ${n.color}`;
            document.getElementById('label-num').className = `text-[10px] ${n.color} opacity-70 font-bold tracking-[0.2em] uppercase mb-1 flex items-center gap-2 font-sans`;
            document.getElementById('key-num').innerText = `靈數 ${n.key}`;
            document.getElementById('name-num').innerText = n.name;
            document.getElementById('name-num').className = `text-2xl font-bold ${n.color} mb-0.5`;
            document.getElementById('benefit-num').innerText = n.benefit;

            // 星座
            const cardZod = document.getElementById('card-zodiac');
            cardZod.className = `group ${z.bgColor} p-6 rounded-[2rem] border ${z.border} transition-all shadow-sm flex items-center gap-6`;
            document.getElementById('icon-zodiac').className = `w-8 h-8 ${z.color}`;
            document.getElementById('label-zodiac').className = `text-[10px] ${z.color} opacity-70 font-bold tracking-[0.2em] uppercase mb-1 flex items-center gap-2 font-sans`;
            document.getElementById('name-zodiac').innerText = z.name;
            document.getElementById('crystal-zodiac').innerText = z.crystal;
            document.getElementById('crystal-zodiac').className = `text-2xl font-bold ${z.color} mb-0.5`;
            document.getElementById('benefit-zodiac').innerText = z.benefit;

            // 生肖
            const cardAni = document.getElementById('card-animal');
            cardAni.className = `group ${a.bgColor} p-6 rounded-[2rem] border ${a.border} transition-all shadow-sm flex items-center gap-6`;
            document.getElementById('val-animal').innerText = animal;
            document.getElementById('val-animal').className = `text-2xl font-bold ${a.color} opacity-60`;
            document.getElementById('label-animal').className = `text-[10px] ${a.color} opacity-70 font-bold tracking-[0.2em] uppercase mb-1 flex items-center gap-2 font-sans`;
            document.getElementById('crystal-animal').innerText = a.crystal;
            document.getElementById('crystal-animal').className = `text-2xl font-bold ${a.color} mb-0.5`;
            document.getElementById('benefit-animal').innerText = a.benefit;

            // 精油標籤
            const tagContainer = document.getElementById('oil-tags');
            tagContainer.innerHTML = n.oils.split('、').map(oil => `
                <span class="bg-white text-emerald-700 text-xs px-3 py-1.5 rounded-full border border-emerald-100 font-bold shadow-sm transition-transform hover:-translate-y-0.5">${oil}</span>
            `).join('');
            document.getElementById('oil-desc').innerText = `生命靈數 ${num} 對應精油。協助落實與調和能量場。`;
        }

        function resetApp() {
            document.getElementById('input-panel').classList.remove('hidden');
            document.getElementById('result-panel').classList.add('hidden');
            document.getElementById('birthday-input').value = '';
        }

        // 百科全書邏輯 (轉化自 source: 42, 45, 47)
        function openLibrary() {
            document.getElementById('library-modal').classList.remove('hidden');
            switchTab('num');
        }

        function closeLibrary() {
            document.getElementById('library-modal').classList.add('hidden');
        }

        function switchTab(tabId) {
            // 切換按鈕樣式
            ['num', 'zodiac', 'animal'].forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                if (t === tabId) {
                    btn.className = "flex-1 py-3 rounded-2xl text-xs font-bold tracking-wider transition-all bg-white text-amber-700 shadow-sm border border-amber-100";
                } else {
                    btn.className = "flex-1 py-3 rounded-2xl text-xs font-bold tracking-wider transition-all text-[#8e8578]";
                }
            });

            const content = document.getElementById('library-content');
            let html = '';

            if (tabId === 'num') {
                Object.entries(NUMEROLOGY_DATA).forEach(([key, d]) => {
                    html += `
                        <div class="p-5 rounded-3xl border ${d.border} ${d.bgColor} flex gap-5 items-start">
                            <div class="w-12 h-12 rounded-full bg-white flex items-center justify-center ${d.color} font-bold text-xl shadow-sm border border-inherit flex-shrink-0">${key}</div>
                            <div>
                                <h4 class="text-lg font-bold ${d.color} flex items-center gap-2">${d.name} <span class="text-[10px] bg-white px-2 py-0.5 rounded-full border border-inherit opacity-60"> ${d.key}</span></h4>
                                <p class="text-[#5c564d] text-sm mt-1">${d.benefit}</p>
                                <p class="text-[#8e8578] text-[10px] mt-2 italic">建議精油：${d.oils}</p>
                            </div>
                        </div>`;
                });
            } else if (tabId === 'zodiac') {
                ZODIAC_DATA.filter((v, i, a) => a.findIndex(t => (t.name === v.name)) === i).forEach(d => {
                    html += `
                        <div class="p-5 rounded-3xl border ${d.border} ${d.bgColor} flex gap-5 items-start">
                            <div class="w-12 h-12 rounded-full bg-white flex items-center justify-center ${d.color} flex-shrink-0 border border-inherit shadow-sm">
                                <i data-lucide="sun" class="w-6 h-6"></i>
                            </div>
                            <div class="flex-1">
                                <h4 class="text-lg font-bold ${d.color}">${d.name} × ${d.crystal}</h4>
                                <p class="text-[#5c564d] text-sm mt-1 leading-relaxed">${d.benefit}</p>
                            </div>
                        </div>`;
                });
            } else {
                CHINESE_LIST.forEach(name => {
                    const d = CHINESE_ZODIAC_DATA[name];
                    html += `
                        <div class="p-5 rounded-3xl border ${d.border} ${d.bgColor} flex gap-5 items-start">
                            <div class="w-12 h-12 rounded-full bg-white flex items-center justify-center flex-shrink-0 border border-inherit shadow-sm">
                                <span class="text-xl font-bold ${d.color} opacity-60">${name}</span>
                            </div>
                            <div class="flex-1">
                                <h4 class="text-lg font-bold ${d.color}">${d.crystal}</h4>
                                <p class="text-[#5c564d] text-sm mt-1 leading-relaxed">${d.benefit}</p>
                            </div>
                        </div>`;
                });
            }
            content.innerHTML = html;
            lucide.createIcons();
        }
    </script>
</body>
</html>
